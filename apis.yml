aid: apache-couchdb
name: Apache CouchDB
description: >-
  Apache CouchDB is an open-source distributed document-oriented NoSQL database governed by the Apache Software Foundation. It uses JSON for data storage, a RESTful HTTP/JSON API for all database operations,
  and the Couch Replication Protocol for multi-primary synchronization across servers, mobile devices, and browsers. CouchDB supports Mango queries, MapReduce views, and offline-first application architectures.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Apache
  - Database
  - Document Store
  - JSON
  - NoSQL
  - Open Source
  - Replication
  - REST
created: '2026-03-16'
modified: '2026-05-29'
